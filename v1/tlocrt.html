        body {

            background: #1a1a1a;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { color: #d4b46e; margin: 0 0 16px; font-size: 20px; }

        .search-box {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 10px;
            padding: 10px 16px;
            width: 100%;
            max-width: 660px;
            box-sizing: border-box;
        }
        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            color: #eee;
            font-size: 18px;
            flex: 1;
            font-family: monospace;
        }
        .search-box input::placeholder { color: #555; }
        .flash {
            font-size: 16px;
            color: #d4b46e;
            min-width: 180px;
            min-height: 24px;
            transition: opacity 0.3s;
        }
        .flash.error { color: #c84b4b; }

        svg { width: 100%; max-width: 660px; border-radius: 10px; }

        .room-label { transition: opacity 0.4s; }
        .room-rect  { transition: filter 0.3s, stroke 0.3s; }

        .glow rect {
            filter: drop-shadow(0 0 8px #d4b46e) !important;
            stroke: #d4b46e !important;
            stroke-width: 2.5px !important;
        }
    </style>
</head>

<script>
    const rooms = {
        '1000':  '🍳 Kuhinja',
        '1100':  '🌿 Vrt',
        '2000':  '🏋️ Teretana',
        '3000':  '🪑 Blagovaonica',
        '4000':  '🚗 Garaža',
        '5000':  '🛌 Spavaća soba',
        '6000':  '🚽 WC',
        '7000':  '🧹 Spajza',
        '8000':  '📚 Radna soba',
        '8100':  '🌙 Balkon',
        '9000':  '🛌 Soba za goste',
        '10000': '🍷 Vinski podrum',
        '11000': '🌡️ Kotlovnica',
        '12000': '👕 Vešeraj',
    };

    // Sobe koje su već otkrivene (ostaju vidljive)
    const discovered = new Set();
    // Trenutno glowing (samo zadnji input)
    let currentGlow = null;

    function applyState(newKeys) {
        discovered.clear();
        // Dodaj nove u discovered
        newKeys.forEach(k => { if (rooms[k]) discovered.add(k); });

        // Makni glow sa svih
        document.querySelectorAll('.glow').forEach(el => el.classList.remove('glow'));
        currentGlow = null;

        // Sve otkrivene sobe — pokaži label
        Object.keys(rooms).forEach(k => {
            const el = document.getElementById('r' + k);
            if (!el) return;
            if (discovered.has(k)) {
                el.querySelectorAll('.room-label').forEach(t => t.setAttribute('opacity', '1'));
            } else {
                el.querySelectorAll('.room-label').forEach(t => t.setAttribute('opacity', '0'));
            }
        });

        // Zadnji upisani valid — glow
        const lastValid = [...newKeys].reverse().find(k => rooms[k]);
        if (lastValid) {
            const el = document.getElementById('r' + lastValid);
            if (el) {
                el.classList.add('glow');
                currentGlow = lastValid;
            }
        }
    }

    let flashTimer = null;

    document.getElementById('roomInput').addEventListener('input', function() {
        const raw = this.value;
        const parts = raw.split(/[,\s]+/).map(s => s.trim()).filter(Boolean);
        const flash = document.getElementById('flash');

        if (!parts.length) {
            flash.textContent = '';
            flash.className = 'flash';
            applyState([]);
            return;
        }

        const valid = parts.filter(k => rooms[k]);
        const invalid = parts.filter(k => k.length >= 3 && !rooms[k]);

        applyState(valid);

        // Flash poruka
        clearTimeout(flashTimer);
        if (valid.length) {
            const last = valid[valid.length - 1];
            flash.textContent = rooms[last];
            flash.className = 'flash';
        } else if (invalid.length) {
            flash.textContent = '?';
            flash.className = 'flash error';
        } else {
            flash.textContent = '';
        }
    });
</script>

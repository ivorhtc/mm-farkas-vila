<!doctype html>
<html lang="hr">
<head>
    <meta charset="utf-8">
    <title>Farkaš Vila — Tlocrt</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", system-ui, sans-serif;
            background: #1a1a1a;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { color: #d4b46e; margin: 0 0 16px; font-size: 20px; }
        .search-box {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 10px;
            padding: 10px 16px;
            width: 100%;
            max-width: 660px;
            box-sizing: border-box;
        }
        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            color: #eee;
            font-size: 18px;
            flex: 1;
            font-family: monospace;
        }
        .search-box input::placeholder { color: #555; }
        .flash { font-size: 16px; color: #d4b46e; min-width: 180px; min-height: 24px; }
        .flash.error { color: #c84b4b; }
        svg { width: 100%; max-width: 660px; border-radius: 10px; }
        .glow rect { filter: drop-shadow(0 0 8px #d4b46e) !important; stroke: #d4b46e !important; stroke-width: 2.5px !important; }
    </style>
</head>
<body>
<h1>🏠 Farkaš vila</h1>
<div class="search-box">
    <input id="roomInput" type="text" placeholder="npr. 1000 ili 1000, 5000" autofocus>
    <div class="flash" id="flash"></div>
</div>

<svg id="tlocrt" viewBox="0 0 680 780">

        <text x="347" y="290" text-anchor="middle" font-size="12" fill="#666" font-family="Segoe UI,sans-serif">1000</text>
    </g>

    <!-- Teretana - label skriven, broj vidljiv -->
    <g id="r2000">

        <text class="room-label" x="489" y="272" text-anchor="middle" font-size="14" font-weight="500" fill="#ED93B1" font-family="Segoe UI,sans-serif" opacity="0">🏋️ Teretana</text>
        <text x="489" y="290" text-anchor="middle" font-size="12" fill="#666" font-family="Segoe UI,sans-serif">2000</text>
    </g>

    <!-- Blagovaonica - label skriven, broj vidljiv -->

        <text class="room-label" x="237" y="376" text-anchor="middle" font-size="14" font-weight="500" fill="#AFA9EC" font-family="Segoe UI,sans-serif" opacity="0">🪑 Blagovaonica</text>
        <text x="237" y="394" text-anchor="middle" font-size="12" fill="#666" font-family="Segoe UI,sans-serif">3000</text>
    </g>

    <!-- Garaža - label skriven, broj vidljiv -->
    <g id="r4000">
        <rect x="347" y="331" width="207" height="100" rx="5" fill="#1a1a1a" stroke="#5F5E5A" stroke-width="1"/>
        <text class="room-label" x="450" y="376" text-anchor="middle" font-size="14" font-weight="500" fill="#B4B2A9" font-family="Segoe UI,sans-serif" opacity="0">🚗 Garaža</text>
        <text x="450" y="394" text-anchor="middle" font-size="12" fill="#666" font-family="Segoe UI,sans-serif">4000</text>
    </g>

    <!-- ===== KAT ===== -->
    <text x="48" y="464" font-size="11" fill="#aaa" font-family="Segoe UI,sans-serif" font-weight="500">KAT</text>
    <!-- Kat wrapper - skriven dok se ne upiše 200 -->
    <g id="kat-wrapper" opacity="0" style="pointer-events:none">
        <rect x="40" y="470" width="600" height="225" rx="8" fill="#1e1015" stroke="#D4537E" stroke-width="1.5"/>
        <rect x="56" y="484" width="72" height="197" rx="5" fill="#222" stroke="#555" stroke-width="1" stroke-dasharray="4 3"/>
        <text x="92" y="573" text-anchor="middle" font-size="20" font-family="Segoe UI,sans-serif">🪜</text>
        <text x="92" y="591" text-anchor="middle" font-size="11" fill="#555" font-family="Segoe UI,sans-serif">prizemlje</text>

        <g id="r5000">
            <rect x="140" y="484" width="160" height="95" rx="5" fill="#1e1810" stroke="#854F0B" stroke-width="1"/>
            <text class="room-label" x="220" y="522" text-anchor="middle" font-size="14" font-weight="500" fill="#FAC775" font-family="Segoe UI,sans-serif" opacity="0">🛌 Spavaća soba</text>
            <text class="room-number" x="220" y="540" text-anchor="middle" font-size="12" fill="#444" font-family="Segoe UI,sans-serif">5000</text>
        </g>
        <g id="r6000">
            <rect x="312" y="484" width="100" height="95" rx="5" fill="#101e18" stroke="#0F6E56" stroke-width="1"/>

            <rect x="424" y="484" width="100" height="95" rx="5" fill="#12101e" stroke="#534AB7" stroke-width="1"/>

            <text class="room-number" x="474" y="540" text-anchor="middle" font-size="12" fill="#444" font-family="Segoe UI,sans-serif">7000</text>
        </g>
        <g id="r8000">
            <rect x="536" y="484" width="92" height="95" rx="5" fill="#101520" stroke="#185FA5" stroke-width="1"/>

            <text class="room-label" x="582" y="533" text-anchor="middle" font-size="13" font-weight="500" fill="#85B7EB" font-family="Segoe UI,sans-serif" opacity="0">soba</text>
            <text class="room-number" x="582" y="551" text-anchor="middle" font-size="12" fill="#444" font-family="Segoe UI,sans-serif">8000</text>
        </g>
        <g id="r9000">
            <rect x="140" y="591" width="200" height="90" rx="5" fill="#1e1510" stroke="#993C1D" stroke-width="1"/>
            <text class="room-label" x="240" y="630" text-anchor="middle" font-size="14" font-weight="500" fill="#F0997B" font-family="Segoe UI,sans-serif" opacity="0">🛌 Soba za goste</text>
            <text class="room-number" x="240" y="648" text-anchor="middle" font-size="12" fill="#444" font-family="Segoe UI,sans-serif">9000</text>
        </g>
        <!-- Balkon - skriven dok se ne upiše 8000 -->
        <g id="r8100" opacity="0" style="pointer-events:none">
            <rect x="352" y="591" width="276" height="90" rx="5" fill="#101e18" stroke="#0F6E56" stroke-width="1" stroke-dasharray="5 3"/>
            <text class="room-label" x="490" y="630" text-anchor="middle" font-size="14" font-weight="500" fill="#5DCAA5" font-family="Segoe UI,sans-serif" opacity="0">🌙 Balkon</text>
            <text class="room-number" x="490" y="648" text-anchor="middle" font-size="12" fill="#444" font-family="Segoe UI,sans-serif">8100</text>
        </g>
    </g>

</svg>

<script>
    const rooms = {
        '0':     '📍 Hodnik — vi ste ovdje',
        '0100':   '🪜 Stube prema podrumu',
        '0200':   '🪜 Stube prema katu',
        '1000':  '🍳 Kuhinja',
        '1100':  '🌿 Vrt',
        '2000':  '🏋️ Teretana',
        '3000':  '🪑 Blagovaonica',
        '4000':  '🚗 Garaža',
        '5000':  '🛌 Spavaća soba',
        '6000':  '🚽 WC',
        '7000':  '🧹 Spajza',
        '8000':  '📚 Radna soba',
        '8100':  '🌙 Balkon',
        '9000':  '🛌 Soba za goste',
        '10000': '🍷 Vinski podrum',
        '11000': '🌡️ Kotlovnica',
        '12000': '👕 Vešeraj',
    };

    // Što se otkrije (samo broj/pravokutnik) kad upišeš ključ
    const reveals = {
        '0100':  ['podrum-wrapper'],
        '0200':  ['kat-wrapper'],
        '8000': ['r8100'],
    };

    const discovered = new Set();
    let currentGlow = null;

    function applyState(keys) {
        discovered.clear();
        document.getElementById('podrum-wrapper').setAttribute('opacity', '0');
        document.getElementById('kat-wrapper').setAttribute('opacity', '0');
        document.getElementById('r8100').setAttribute('opacity', '0');
        // Što se otkrije (samo broj/pravokutnik) kad upišeš ključ
        keys.forEach(k => { if (rooms[k]) discovered.add(k); });

        // Otkrij wrappere i sub-elemente
        discovered.forEach(k => {
            if (reveals[k]) {
                reveals[k].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) { el.setAttribute('opacity', '1'); el.style.pointerEvents = ''; }
                });
            }
        });

        // Pokaži labele za otkrivene sobe
        Object.keys(rooms).forEach(k => {
            const el = document.getElementById('r' + k);
            if (!el) return;
            if (discovered.has(k)) {
                el.querySelectorAll('.room-label').forEach(t => t.setAttribute('opacity', '1'));
            } else {
                el.querySelectorAll('.room-label').forEach(t => t.setAttribute('opacity', '0'));
            }
        });

        // Glow na zadnji valid
        if (currentGlow) {
            const old = document.getElementById('r' + currentGlow);
            if (old) old.classList.remove('glow');
            currentGlow = null;
        }
        const lastValid = [...keys].reverse().find(k => rooms[k]);
        if (lastValid) {
            const el = document.getElementById('r' + lastValid);
            if (el) { el.classList.add('glow'); currentGlow = lastValid; }
        }
    }

    document.getElementById('roomInput').addEventListener('input', function() {
        const parts = this.value.split(/[,\s]+/).map(s => s.trim()).filter(Boolean);
        const flash = document.getElementById('flash');
        if (!parts.length) { flash.textContent = ''; flash.className = 'flash'; applyState([]); return; }
        const valid = parts.filter(k => rooms[k]);
        applyState(valid);
        if (valid.length) {
            flash.textContent = rooms[valid[valid.length - 1]];
            flash.className = 'flash';
        } else {
            flash.textContent = parts.some(p => p.length >= 3) ? '?' : '';
            flash.className = 'flash error';
        }
    });
</script>
</body>
</html>

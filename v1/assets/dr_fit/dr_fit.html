<!doctype html>
<html lang="hr">
<head>
  <meta charset="utf-8">
  <title>@davoriradojkafit • Instagram</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #262626;
      max-width: 480px;
      margin: 0 auto;
    }

    /* TOP BAR */
    .topbar {
      background: #fff;
      border-bottom: 1px solid #dbdbdb;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar .logo {
      font-family: Georgia, serif;
      font-size: 22px;
      letter-spacing: -0.5px;
    }
    .topbar .icons { display: flex; gap: 16px; }
    .topbar .icons span { font-size: 22px; cursor: pointer; }

    /* PROFILE HEADER */
    .profile-header {
      background: #fff;
      padding: 20px 16px 16px;
    }
    .profile-top {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 16px;
    }
    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid #dbdbdb;
      background: #efefef;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .stats {
      display: flex;
      gap: 20px;
      flex: 1;
    }
    .stat { text-align: center; }
    .stat strong { display: block; font-size: 16px; font-weight: 600; }
    .stat span { font-size: 13px; color: #737373; }

    .profile-name { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
    .profile-bio { font-size: 14px; line-height: 1.5; color: #262626; }
    .profile-bio .faded { color: #737373; font-size: 13px; }

    .follow-btn {
      width: 100%;
      margin-top: 12px;
      padding: 7px;
      background: #0095f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }

    /* TABS */
    .tabs {
      background: #fff;
      border-bottom: 1px solid #dbdbdb;
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 12px 0 0;
    }
    .tab {
      padding-bottom: 12px;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-size: 20px;
    }
    .tab.active { border-bottom-color: #262626; }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
      background: #fafafa;
    }
    .grid-item {
      aspect-ratio: 1;
      background: #efefef;
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }
    .grid-item img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .grid-item .placeholder {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #efefef;
      color: #aaa;
      font-size: 12px;
      gap: 6px;
    }
    .grid-item .placeholder span { font-size: 28px; }

    /* LAST ACTIVE */
    .last-active {
      padding: 12px 16px;
      font-size: 12px;
      color: #737373;
      text-align: center;
      background: #fff;
      border-top: 1px solid #dbdbdb;
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">Instagram</div>
  <div class="icons">
    <span>🔔</span>
    <span>✉️</span>
  </div>
</div>

<!-- PROFILE HEADER -->
<div class="profile-header">
  <div class="profile-top">
    <div class="avatar">
      <!-- Zamijeni src s pravom slikom: <img src="davor.jpg"> -->
      🏋️
    </div>
    <div class="stats">
      <div class="stat"><strong>23</strong><span>objave</span></div>
      <div class="stat"><strong>412</strong><span>pratitelja</span></div>
      <div class="stat"><strong>389</strong><span>praćenja</span></div>
    </div>
  </div>

  <div class="profile-name">Davor i Radojka Fit</div>
  <div class="profile-bio">
    💪 Personalni treninzi · Zagreb<br>
    📍 Vila, teretana, park — dolazimo k vama<br>
    📩 davoriradojkafit@gmail.com<br>
    <span class="faded">radojka.fit</span>
  </div>

  <button class="follow-btn">Prati</button>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active">⊞</div>
  <div class="tab">🎬</div>
  <div class="tab">🏷️</div>
</div>

<!-- PHOTO GRID -->
<div class="grid">

  <!-- Post 1 - zamijeni src s pravom slikom -->
  <div class="grid-item">
    <img src="dr_fit1.png" alt="Post 1">
    <div class="placeholder">
      <span>📸</span>
      slika 1
    </div>
  </div>

  <!-- Post 2 - zamijeni src s pravom slikom -->
  <div class="grid-item">
    <img src="dr_fit2.png" alt="Post 2">
    <div class="placeholder">
      <span>📸</span>
      slika 2
    </div>
  </div>

  <!-- Post 3 - zamijeni src s pravom slikom -->
  <div class="grid-item">
    <img src="dr_fit3.png" alt="Post 3">
    <div class="placeholder">
      <span>📸</span>
      slika 3
    </div>
  </div>

</div>

<!-- LAST ACTIVE -->
<div class="last-active">
  Davor aktivan prije 7 dana · Radojka napustila profil
</div>

</body>
</html>

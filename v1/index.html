<!doctype html>
<html lang="hr">
<head>
  <meta charset="utf-8">
  <title>Murder Mystery Evaluator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg1: #171414;
      --bg2: #2a1c1c;
      --card: #000000;
      --accent: #c84b4b;
      --gold: #d4b46e;
    }
    html, body {
      height: 100%;
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(circle at 10% 10%, var(--bg2), var(--bg1));
    }
    .wrap { max-width: 1100px; margin: 28px auto; padding: 20px; }
    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }
    h1 { color: var(--gold); }
    h3, h4 { color: var(--gold); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; }
    .player-box {
      background: #fff;
      border-radius: 16px;
      padding: 14px;
      text-align: center;
    }
    .player-emoji { font-size: 40px; }
    .player-label { font-weight: bold; display: block; margin-bottom: 6px; }
    .player-box input {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: none;
      box-sizing: border-box;
    }
    .hint-box {
      font-size: 12px;
      margin-top: 6px;
      color: #333;
      text-align: left;
    }
    .hint-box div {
      background: #f3f3f3;
      padding: 3px 6px;
      border-radius: 6px;
      margin-bottom: 3px;
    }
    .globals-row { margin-top: 10px; }
    .globals-row label { color: var(--gold); display: block; margin-bottom: 4px; }
    .globals-row input {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: none;
      box-sizing: border-box;
    }
    .controls { margin-top: 10px; }
    button {
      background: var(--accent);
      border: none;
      color: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
    }
    .result-card {
      margin-top: 15px;
      background: #ffffff;
      border-radius: 14px;
      padding: 15px;
    }
    .result-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .result-card-header button { font-size: 12px; padding: 4px 10px; }
    .result-card-body div { margin-bottom: 6px; }
    pre {
      background: #0d0b0b;
      color: #ddd;
      padding: 10px;
      border-radius: 8px;
      max-height: 300px;
      overflow: auto;
    }
    #loadStatus { color: var(--gold); font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>🎩 Villa 2 Murder Mystery</h1>
    <div id="loadStatus">Učitavanje game_files...</div>

    <div class="grid">
      <div class="player-box">
        <div class="player-emoji">🐈‍⬛⚫</div>
        <label id="label1" class="player-label">Crni (Samir)</label>
        <input id="p1"><div class="hint-box" id="desc-p1"></div>
      </div>
      <div class="player-box">
        <div class="player-emoji">🐥🟡</div>
        <label id="label2" class="player-label">Žuti (Igor)</label>
        <input id="p2"><div class="hint-box" id="desc-p2"></div>
      </div>
      <div class="player-box">
        <div class="player-emoji">🐋🔵</div>
        <label id="label3" class="player-label">Plavi (Viktor)</label>
        <input id="p3"><div class="hint-box" id="desc-p3"></div>
      </div>
      <div class="player-box">
        <div class="player-emoji">🦀🔴</div>
        <label id="label4" class="player-label">Crveni (Radomir)</label>
        <input id="p4"><div class="hint-box" id="desc-p4"></div>
      </div>
      <div class="player-box">
        <div class="player-emoji">🐍🟢</div>
        <label id="label5" class="player-label">Zeleni (Davor)</label>
        <input id="p5"><div class="hint-box" id="desc-p5"></div>
      </div>
      <div class="player-box">
        <div class="player-emoji">🍆🟣</div>
        <label id="label6" class="player-label">Ljubičasti (Oliver)</label>
        <input id="p6"><div class="hint-box" id="desc-p6"></div>
      </div>
      <div class="player-box">
        <div class="player-emoji">⚠️</div>
        <label id="label7" class="player-label">Voditelj</label>
        <input id="p7"><div class="hint-box" id="desc-p7"></div>
      </div>
    </div>

    <div class="globals-row">
      <label>Globalni brojevi (flagovi)</label>
      <input id="p-globalNumbers" placeholder="npr. 80021, 90031, 100001">
      <div class="hint-box" id="desc-p-globalNumbers"></div>
    </div>

    <div class="controls">
      <button id="evalBtn">⚖️ Evaluiraj</button>
    </div>

    <h3>Rezultati</h3>
    <div id="result"></div>
    <h4>Debug</h4>
    <pre id="debug">—</pre>
  </div>
</div>

<script>
// ============================================================
// GAME FILES - lista svih room fileova
// ============================================================
const ROOM_FILES = [
  'aaa_globalne_stvari', 'vila_izvana', 'radna_soba', 'kuhinja', 'teretana', 'blagovaonica',
  'garaza', 'spavaca_soba', 'wc', 'spajza', 'balkon', 'soba_za_goste',
  'vinski_podrum', 'kotlovnica', 'vesheraj', 'instagram', 'hakiranje', 'razgovori'
];

// ============================================================
// STATE
// ============================================================
let rulesCache   = [];
let playerCache  = {};
let roomMap      = {};

// ============================================================
// LOAD - učitaj settings + sve room fileove
// ============================================================
async function loadGameFiles() {
  const status = document.getElementById('loadStatus');

  // Settings
  const settingsData = await fetch('game_files/settings.json').then(r => r.json());
  buildPlayerCache(settingsData);
  buildRoomMap(settingsData);

  // Room files
  const roomPromises = ROOM_FILES.map(name =>
    fetch(`game_files/rooms/${name}.json`).then(r => r.json())
  );
  const roomData = await Promise.all(roomPromises);

  // Spoji sve u rules i items
  const allRules = [];
  const allItems = [];

  roomData.forEach((fileContent, idx) => {
    fileContent.forEach(obj => {
      if (obj.type === 'rule') allRules.push(obj);
      else if (obj.type === 'item' || obj.type === 'event') allItems.push(obj);
      // story se ignorira
    });
  });

  rulesCache = allRules;
  status.textContent = `✅ Učitano: ${allRules.length} rules, ${allItems.length} items iz ${ROOM_FILES.length} soba`;

  return { rules: allRules, items: allItems };
}

// ============================================================
// SETTINGS PROCESSING
// ============================================================
function buildPlayerCache(settings) {
  playerCache = {};
  settings.forEach(obj => {
    for (const key in obj) {
      if (key.startsWith("p") && !isNaN(key.slice(1))) {
        const idx = parseInt(key.slice(1));
        playerCache[key]            = obj.attr;
        playerCache["Player" + idx] = obj.attr;
        setPlayerLabel(idx, obj[key]);
        if (obj.color) setPlayerColor(idx, obj.color);
      }
    }
  });
}

function buildRoomMap(settings) {
  roomMap = {};
  settings.forEach(obj => {
    if (!obj.rooms) return;
    Object.entries(obj.rooms).forEach(([parent, children]) => {
      children.forEach(child => {
        roomMap[child.toString()] = parent.toString();
      });
    });
  });
}

// ============================================================
// PLAYER INPUT
// ============================================================
function readPlayerInputs() {
  return [1,2,3,4,5,6,7].map(n => {
    const input = document.getElementById("p" + n);
    if (!input) return null;
    const v = input.value.trim();
    if (!v) return null;
    return v.split(/[;,]/).map(x => x.trim()).filter(Boolean);
  });
}

function expandWithParentRooms(players) {
  return players.map(vals => {
    if (!vals) return null;
    const expanded = new Set(vals);
    vals.forEach(v => {
      const parent = roomMap[v];
      if (parent) expanded.add(parent);
    });
    return Array.from(expanded);
  });
}

// ============================================================
// NUMBER MAP
// ============================================================
function buildNumberMap(players, globals) {
  const map = {};
  players.forEach((vals, i) => {
    if (!vals) return;
    vals.forEach(n => {
      if (!map[n]) map[n] = new Set();
      map[n].add(i);
    });
  });
  globals.forEach(g => {
    if (!map[g]) map[g] = new Set();
    players.forEach((v, i) => { if (v) map[g].add(i); });
  });
  const out = {};
  Object.keys(map).forEach(k => out[k] = Array.from(map[k]));
  return out;
}

// ============================================================
// VALID ROOMS
// ============================================================
function getValidRooms() {
  const valid = new Set(Object.values(roomMap));
  Object.keys(roomMap).forEach(k => valid.add(k));
  return valid;
}

// ============================================================
// RULE EVALUATOR
// ============================================================
function makeEvaluator(condString) {
  const s = (condString || '').replace(/\s+/g, ' ').trim();
  const numTokens    = [...new Set(s.match(/\b\d+\b/g)    || [])];
  const playerTokens = [...new Set((s.match(/\bp\d+\b/ig) || []).map(t => t.toLowerCase()))];
  const minMaxTokens = [...new Set((s.match(/\b(min|max)\d+p\b/ig) || []).map(t => t.toLowerCase()))];

  return function evaluate({ players, numberMap }) {
    const playersForNumber = {};
    numTokens.forEach(n => { playersForNumber[n] = numberMap[n] || []; });

    const combinedSet = new Set();
    numTokens.forEach(n => playersForNumber[n].forEach(i => combinedSet.add(i)));

    const varMap = {};
    numTokens.forEach(n => { varMap[n] = playersForNumber[n].length > 0; });

    // Igrači: ako uvjet ima sobe → p4 znači "p4 je unio tu sobu"
    //         inače → p4 znači "p4 je prisutan"
    const validRoomsLocal = getValidRooms();
    const roomNumTokens = numTokens.filter(n => validRoomsLocal.has(n));

    playerTokens.forEach(pt => {
      const idx = parseInt(pt.slice(1), 10) - 1;
      if (roomNumTokens.length > 0) {
        const inRoom = roomNumTokens.some(n => (playersForNumber[n] || []).includes(idx));
        varMap[pt] = inRoom;
      } else {
        varMap[pt] = players[idx] !== null;
      }
    });

    minMaxTokens.forEach(tok => {
      const m = tok.match(/(min|max)(\d+)p/i);
      if (!m) return;
      const n = parseInt(m[2], 10);
      varMap[tok] = m[1] === 'min' ? combinedSet.size >= n : combinedSet.size <= n;
    });

    let expr = s
      .replace(/\bNOT\b/ig, '!')
      .replace(/\bAND\b/ig, '&&')
      .replace(/\bOR\b/ig,  '||');

    const allTokens = [...minMaxTokens, ...playerTokens, ...numTokens]
      .sort((a, b) => b.length - a.length);

    allTokens.forEach(tok => {
      const re  = new RegExp('\\b' + tok.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'ig');
      const val = varMap[tok] ?? false;
      expr = expr.replace(re, val ? 'true' : 'false');
    });

    expr = expr
      .replace(/\bp\d+\b/ig, 'false')
      .replace(/\b\d+\b/g, m => (varMap[m] ? 'true' : 'false'))
      .replace(/\s+/g, ' ');

    let passed = false, evalError = null;
    try { passed = Function('"use strict"; return (' + expr + ');')(); }
    catch (e) { evalError = e.toString(); }

    let assigned;
    if (playerTokens.length > 0) {
      assigned = playerTokens
        .map(pt => parseInt(pt.slice(1), 10) - 1)
        .filter(i => i >= 0 && i < players.length && players[i] !== null);
    } else if (numTokens.length > 0) {
      assigned = [...combinedSet].sort((a, b) => a - b);
    } else {
      assigned = players.map((v, i) => v !== null ? i : -1).filter(i => i >= 0);
    }

    const notMatches = s.match(/\bNOT\s+p\d+\b/ig) || [];
    notMatches.forEach(m => {
      const idx = parseInt(m.match(/\d+/)[0], 10) - 1;
      assigned = assigned.filter(x => x !== idx);
    });

    return {
      passed, expr, evalError, numTokens,
      assignedPlayers: assigned.map(i => 'Player' + (i + 1)),
    };
  };
}

// ============================================================
// PLACEHOLDER ZAMJENA
// ============================================================
function replacePlaceholders(text, winnerPlayerName) {
  if (!winnerPlayerName) return text;
  const idx = parseInt(winnerPlayerName.replace("Player", ""));
  const p   = playerCache["p" + idx];
  if (!p) return text;
  return text
    .replace(/\$\{winner\}/g,  `"${p.icon} ${p.n}"`)
    .replace(/\$\{winnerN\}/g, `"${p.icon} ${p.n}"`)
    .replace(/\$\{winnerG\}/g, `"${p.icon} ${p.g}"`)
    .replace(/\$\{winnerD\}/g, `"${p.icon} ${p.d}"`)
    .replace(/\$\{winnerA\}/g, `"${p.icon} ${p.a}"`)
    .replace(/\$\{winnerV\}/g, `"${p.icon} ${p.v}"`)
    .replace(/\$\{winnerL\}/g, `"${p.icon} ${p.l}"`)
    .replace(/\$\{winnerI\}/g, `"${p.icon} ${p.i}"`);
}

// ============================================================
// ROOM BROADCAST - za talk iteme
// ============================================================
function getPlayersInSameRoom(triggeredPlayers, numberMap, allPlayers) {
  const validRooms = getValidRooms();
  const roomsPerPlayer = {};

  triggeredPlayers.forEach(pName => {
    const idx = parseInt(pName.replace("Player", "")) - 1;
    roomsPerPlayer[pName] = new Set();
    Object.entries(numberMap).forEach(([num, playerIdxs]) => {
      if (!playerIdxs.includes(idx)) return;
      if (!validRooms.has(num)) return;
      roomsPerPlayer[pName].add(roomMap[num] || num);
    });
  });

  const playerNames = Object.keys(roomsPerPlayer);
  if (playerNames.length === 0) return triggeredPlayers;

  let sharedRooms = roomsPerPlayer[playerNames[0]];
  for (let i = 1; i < playerNames.length; i++) {
    sharedRooms = new Set([...sharedRooms].filter(r => roomsPerPlayer[playerNames[i]].has(r)));
  }

  if (sharedRooms.size === 0) return [];

  const result = new Set(triggeredPlayers);
  allPlayers.forEach((vals, i) => {
    if (!vals) return;
    const arr = Array.isArray(vals) ? vals : [vals];
    arr.forEach(v => {
      if (!validRooms.has(v)) return;
      if (sharedRooms.has(roomMap[v] || v)) result.add("Player" + (i + 1));
    });
  });

  return Array.from(result);
}

// ============================================================
// VODITELJ HELPER
// ============================================================
function pushVoditeljInfo(obj, playerCards) {
  if (obj.global) playerCards["Player7"].push("__global__" + obj.global);
  if (obj.admin)  playerCards["Player7"].push(obj.admin);
}

// ============================================================
// ITEM DISPATCH
// ============================================================
function dispatchItem(eventObj, triggeredPlayers, playerCards, players, numberMap, out) {
  if (eventObj.type === "event") {
    const involved = [...triggeredPlayers];
    let winner = null;
    if (eventObj.logic?.winnerStrategy === "priorityList") {
      for (const p of eventObj.logic.priorityList) {
        const pName = p.replace("p", "Player");
        if (involved.includes(pName)) { winner = pName; break; }
      }
    }
    if (winner && eventObj.output.winner) {
      playerCards[winner].push(eventObj.output.winner);
    }
    involved.forEach(p => {
      if (p !== winner && eventObj.output.others) {
        playerCards[p].push(replacePlaceholders(eventObj.output.others, winner));
      }
    });
    Object.entries(eventObj.output).forEach(([key, val]) => {
      if (key === "winner" || key === "others") return;
      if (key === "p7") { playerCards["Player7"].push(replacePlaceholders(val, winner)); return; }
      if (key.startsWith("p")) {
        const pName = "Player" + parseInt(key.slice(1));
        if (playerCards[pName] && involved.includes(pName)) {
          playerCards[pName].push(replacePlaceholders(val, winner));
        }
      }
      if (key === "global") playerCards["Player7"].push("__global__" + val);
    });
  } else {
    const isTalk     = out.startsWith("talk");
    const recipients = isTalk
      ? getPlayersInSameRoom(triggeredPlayers, numberMap, players)
      : triggeredPlayers;

    if (isTalk && recipients.length === 0) return;

    recipients.forEach(p => playerCards[p].push(eventObj.value || out));

    [1,2,3,4,5,6].forEach(n => {
      const key   = "p" + n;
      const pName = "Player" + n;
      if (eventObj[key] && playerCards[pName] && recipients.includes(pName)) {
        playerCards[pName].push(eventObj[key]);
      }
    });
    if (eventObj.p7) playerCards["Player7"].push(eventObj.p7);
    pushVoditeljInfo(eventObj, playerCards);
  }
}

// ============================================================
// UI HELPERS
// ============================================================
function setPlayerLabel(i, name) {
  const el = document.getElementById("label" + i);
  if (el) el.innerText = name;
}
function setPlayerColor(i, color) {
  const boxes = document.getElementsByClassName("player-box");
  if (boxes[i - 1]) boxes[i - 1].style.background = color;
}
function copyText(t) {
  navigator.clipboard.writeText(t);
  alert("Kopirano!");
}

function updateHints(input) {
  const vals = input.value.split(/[;,]/).map(v => v.trim()).filter(Boolean);
  const box  = document.getElementById("desc-" + input.id);
  if (!box) return;
  const hints = vals.flatMap(v =>
    rulesCache.filter(r => r.cond === v && r.desc).map(r => r.desc)
  );
  box.innerHTML = hints.map(d => `<div>${d}</div>`).join("");
}

document.querySelectorAll("[id^='p']").forEach(input => {
  let timer = null;
  input.addEventListener("input", () => {
    clearTimeout(timer);
    timer = setTimeout(() => updateHints(input), 300);
  });
});

// ============================================================
// RENDER RESULTS
// ============================================================
function renderResults(playerCards) {
  let html = "";
  Object.entries(playerCards).forEach(([pName, cards]) => {
    if (cards.length === 0) return;
    const idx  = parseInt(pName.replace("Player", ""));
    const name = document.getElementById("label" + idx)?.innerText || pName;

    let displayCards;
    if (pName === "Player7") {
      const globalFlags = cards
        .filter(c => c.startsWith("__global__"))
        .map(c => c.replace("__global__", "").trim());
      const otherCards = cards.filter(c => !c.startsWith("__global__"));
      displayCards = globalFlags.length > 0
        ? ["add to global: " + globalFlags.join(", "), ...otherCards]
        : otherCards;
    } else {
      displayCards = cards;
    }

    const text = displayCards.join("\n\n");
    html += `
      <div class="result-card">
        <div class="result-card-header">
          <strong>${name}</strong>
          <button onclick="copyText(\`${text.replace(/`/g, "'")}\`)">Copy</button>
        </div>
        <div class="result-card-body">
          ${displayCards.map(c => `<div>${c}</div>`).join("")}
        </div>
      </div>`;
  });
  document.getElementById("result").innerHTML = html || "Nema rezultata.";
}

// ============================================================
// MAIN
// ============================================================
document.getElementById("evalBtn").addEventListener("click", async () => {
  const { rules, items } = await loadGameFiles();

  const rawPlayers = readPlayerInputs();
  const globals    = (document.getElementById("p-globalNumbers").value || "")
    .split(",").map(x => x.trim()).filter(Boolean);

  const players   = expandWithParentRooms(rawPlayers);
  const numberMap = buildNumberMap(players, globals);

  const itemMap = {};
  items.forEach(obj => { if (obj.key) itemMap[obj.key] = obj; });

  const playerCards = {};
  players.forEach((_, i) => playerCards["Player" + (i + 1)] = []);

  const debugLines = [];
  rawPlayers.forEach((raw, i) => {
    if (!raw) return;
    const added = (players[i] || []).filter(x => !raw.includes(x));
    if (added.length > 0) debugLines.push(`Player${i+1} +rooms: [${added.join(", ")}]`);
  });
  if (debugLines.length) debugLines.push("");

  const outputs = [];
  rules.forEach((rule, idx) => {
    if (!rule.cond) return;
    const cond     = rule.cond.toString();
    const out      = rule.out || ("out_" + idx);
    const evaluate = makeEvaluator(cond);
    const result   = evaluate({ players, numberMap });

    debugLines.push(`Rule ${idx+1}: cond="${cond}" out="${out}"`);
    debugLines.push(`  expr:     ${result.expr}`);
    debugLines.push(`  passed:   ${result.passed}`);
    debugLines.push(`  assigned: ${JSON.stringify(result.assignedPlayers)}`);
    if (result.evalError) debugLines.push(`  ERROR:    ${result.evalError}`);
    debugLines.push("");

    if (result.passed) {
      let recipients = result.assignedPlayers;
      if (!out.startsWith("talk") && result.numTokens && result.numTokens.length > 0) {
        const validRooms = getValidRooms();
        const roomNums = result.numTokens.filter(n => validRooms.has(n));
        if (roomNums.length > 0) {
          const roomPlayers = new Set();
          roomNums.forEach(n => {
            (numberMap[n] || []).forEach(i => roomPlayers.add("Player" + (i + 1)));
          });
          recipients = [...roomPlayers];
        }
      }
      if (recipients.length > 0) {
        outputs.push({ out, players: recipients, rule });
      }
    }
  });

  outputs.forEach(({ out, players: triggered, rule }) => {
    if (triggered.length === 0) return;
    const item = itemMap[out];
    if (!item) return;

    if (out.startsWith("talk")) {
      const recipients = getPlayersInSameRoom(triggered, numberMap, players);
      if (recipients.length === 0) return;
      pushVoditeljInfo(rule, playerCards);
      recipients.forEach(p => playerCards[p].push(item.value || out));
    } else {
      dispatchItem(item, triggered, playerCards, players, numberMap, out);
      if (rule.global || rule.admin) pushVoditeljInfo(rule, playerCards);
    }
  });

  // Deduplikacija
  Object.keys(playerCards).forEach(p => {
    playerCards[p] = [...new Set(playerCards[p])];
  });

  renderResults(playerCards);
  document.getElementById("debug").innerText = debugLines.join("\n");
});

// Učitaj settings odmah pri startu
loadGameFiles().catch(e => {
  document.getElementById('loadStatus').textContent = '❌ Greška pri učitavanju: ' + e.message;
});
</script>
</body>
</html>
